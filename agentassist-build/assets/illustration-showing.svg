<svg width="220" height="180" viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- House silhouette -->
  <rect x="40" y="80" width="140" height="85" rx="4" fill="#1C2A3A"/>
  <polygon points="30,82 110,22 190,82" fill="#1E3347"/>
  <!-- Roof highlight -->
  <polygon points="30,82 110,22 120,22 40,82" fill="#243D54" opacity="0.5"/>
  <!-- Door -->
  <rect x="88" y="118" width="24" height="47" rx="3" fill="#0D1B2A"/>
  <circle cx="107" cy="143" r="2.5" fill="#E8314A"/>
  <!-- Windows -->
  <rect x="52" y="95" width="28" height="22" rx="3" fill="#0D1B2A"/>
  <rect x="140" y="95" width="28" height="22" rx="3" fill="#0D1B2A"/>
  <!-- Window glow left -->
  <rect x="53" y="96" width="13" height="10" rx="1" fill="#2A4A6B" opacity="0.8"/>
  <!-- Window glow right -->
  <rect x="141" y="96" width="13" height="10" rx="1" fill="#E8314A" opacity="0.25"/>
  <!-- Eye outer glow rings -->
  <ellipse cx="163" cy="46" rx="22" ry="14" fill="#E8314A" opacity="0.15"/>
  <ellipse cx="163" cy="46" rx="14" ry="9" fill="#E8314A" opacity="0.2"/>
  <!-- Eye -->
  <circle cx="163" cy="46" r="6" fill="#E8314A"/>
  <circle cx="163" cy="46" r="2.5" fill="#ffffff"/>
  <circle cx="164.5" cy="44.5" r="1" fill="#ffffff" opacity="0.6"/>
  <!-- Scan lines from eye -->
  <line x1="149" y1="46" x2="132" y2="55" stroke="#E8314A" stroke-width="1" stroke-dasharray="3 2" opacity="0.4"/>
  <line x1="149" y1="46" x2="130" y2="46" stroke="#E8314A" stroke-width="1" stroke-dasharray="3 2" opacity="0.4"/>
  <!-- Ground -->
  <rect x="20" y="164" width="180" height="2" rx="1" fill="#1C2A3A"/>
  <!-- Path -->
  <rect x="96" y="164" width="28" height="6" rx="1" fill="#1C2A3A"/>
  <!-- LIVE badge -->
  <rect x="48" y="140" width="36" height="16" rx="8" fill="#E8314A" opacity="0.12"/>
  <rect x="49" y="141" width="34" height="14" rx="7" stroke="#E8314A" stroke-width="0.8" opacity="0.4" fill="none"/>
  <text x="66" y="151" text-anchor="middle" fill="#E8314A" font-size="7" font-family="-apple-system, Helvetica, sans-serif" font-weight="600">LIVE</text>
</svg>
