<svg width="220" height="180" viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect x="45" y="25" width="130" height="140" rx="18" fill="#1C2A3A"/>
  <rect x="45" y="25" width="130" height="140" rx="18" stroke="#243D54" stroke-width="1.5" fill="none"/>
  <!-- Header accent band -->
  <rect x="45" y="25" width="130" height="50" rx="18" fill="#E8314A" opacity="0.08"/>
  <rect x="45" y="55" width="130" height="20" fill="#E8314A" opacity="0.08"/>
  <!-- Avatar outer ring glow -->
  <circle cx="110" cy="72" r="26" fill="#E8314A" opacity="0.04"/>
  <!-- Avatar circle -->
  <circle cx="110" cy="72" r="26" fill="#0D1B2A"/>
  <circle cx="110" cy="72" r="23" fill="#1A2535"/>
  <!-- Avatar head -->
  <circle cx="110" cy="65" r="10" fill="#2D4A68"/>
  <!-- Avatar shoulders -->
  <path d="M89 89 Q110 78 131 89" fill="#2D4A68"/>
  <!-- Verified badge -->
  <circle cx="129" cy="89" r="9" fill="#E8314A"/>
  <path d="M124 89 l3 3 l6 -6" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Name bar -->
  <rect x="72" y="103" width="76" height="7" rx="3.5" fill="#2D4A68"/>
  <!-- Subtitle bar -->
  <rect x="83" y="115" width="54" height="5" rx="2.5" fill="#243D54" opacity="0.8"/>
  <!-- Divider -->
  <rect x="57" y="130" width="106" height="1" fill="#243D54"/>
  <!-- Stat 1: Tasks -->
  <rect x="66" y="137" width="20" height="6" rx="3" fill="#2D4A68" opacity="0.5"/>
  <rect x="64" y="147" width="24" height="4" rx="2" fill="#243D54" opacity="0.5"/>
  <!-- Stat 2: Rating (accent) -->
  <rect x="100" y="137" width="20" height="6" rx="3" fill="#E8314A" opacity="0.7"/>
  <rect x="98" y="147" width="24" height="4" rx="2" fill="#243D54" opacity="0.5"/>
  <!-- Stat 3: Reviews -->
  <rect x="134" y="137" width="20" height="6" rx="3" fill="#2D4A68" opacity="0.5"/>
  <rect x="132" y="147" width="24" height="4" rx="2" fill="#243D54" opacity="0.5"/>
  <!-- Star ratings (4 filled, 1 empty) -->
  <!-- Star 1 -->
  <path d="M69 165 l2 -5 l2 5 h5 l-4 3 l1.5 5 L71 170 l-4.5 3 l1.5 -5 l-4 -3 z" fill="#E8314A" opacity="0.85"/>
  <!-- Star 2 -->
  <path d="M83 165 l2 -5 l2 5 h5 l-4 3 l1.5 5 L85 170 l-4.5 3 l1.5 -5 l-4 -3 z" fill="#E8314A" opacity="0.85"/>
  <!-- Star 3 -->
  <path d="M97 165 l2 -5 l2 5 h5 l-4 3 l1.5 5 L99 170 l-4.5 3 l1.5 -5 l-4 -3 z" fill="#E8314A" opacity="0.85"/>
  <!-- Star 4 -->
  <path d="M111 165 l2 -5 l2 5 h5 l-4 3 l1.5 5 L113 170 l-4.5 3 l1.5 -5 l-4 -3 z" fill="#E8314A" opacity="0.85"/>
  <!-- Star 5 (empty) -->
  <path d="M125 165 l2 -5 l2 5 h5 l-4 3 l1.5 5 L127 170 l-4.5 3 l1.5 -5 l-4 -3 z" fill="#243D54" opacity="0.4"/>
</svg>
